# =====================================================
# [prod] 운영 환경 설정
# =====================================================

# Datasource — 실제 MySQL 드라이버 (P6Spy 제거)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/utopsoft?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=passw0rd

# HikariCP — 운영 환경 커넥션 풀 확대
spring.datasource.hikari.pool-name=UtopsoftPool-Prod
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# DevTools — 운영에서 비활성화
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# 파일 로그 레벨 (WARN: 경고 이상만 기록)
app.log.file.level=WARN

# Swagger 완전 비활성화
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
