spring.application.name=utopsofit

# =====================================================
# Server
# =====================================================
server.port=22020

# =====================================================
# Datasource (MySQL) - \uc6d0\ubcf8 (\uc8fc\uc11d)
# =====================================================
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://localhost:3306/utopsoft?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
#spring.datasource.username=root
#spring.datasource.password=passw0rd

# =====================================================
# Datasource (P6Spy - SQL \ub85c\uae45\uc6a9 \ud504\ub85d\uc2dc \ub4dc\ub77c\uc774\ubc84)
# =====================================================
spring.datasource.driver-class-name=com.p6spy.engine.spy.P6SpyDriver
spring.datasource.url=jdbc:p6spy:mysql://localhost:3306/utopsoft?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=passw0rd

# HikariCP \ucee4\ub125\uc158 \ud480 \uc0c1\uc138 \uc124\uc815
spring.datasource.hikari.pool-name=UtopsoftPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# \ucee4\ub125\uc158 \uc720\ud6a8\uc131 \uac80\uc0ac \ucffc\ub9ac
spring.datasource.hikari.connection-test-query=SELECT 1

# =====================================================
# MyBatis (MyBatisConfig.java \uc5d0\uc11c \uc9c1\uc811 \uc124\uc815)
# =====================================================

# =====================================================
# JSP View
# =====================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# =====================================================
# Logging (log4j2.xml \ucc38\uc870)
# =====================================================
# =====================================================
# DevTools
# =====================================================
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

logging.config=classpath:log4j2-spring.xml

# 로그 파일 저장 경로
app.log.dir=/utopsoft/logs

# 파일 로깅 레벨: ALL | DEBUG | INFO | WARN | ERROR | OFF
# OFF 로 변경하면 파일 로깅 전체 비활성화 (콘솔 출력은 유지)
app.log.file.level=ALL

# =====================================================
# Spring Batch
# =====================================================
# \uc560\ud50c\ub9ac\ucf00\uc774\uc158 \uc2dc\uc791 \uc2dc Job \uc790\ub3d9 \uc2e4\ud589 \ubc29\uc9c0
spring.batch.job.enabled=false
# Batch \uba54\ud0c0 \ud14c\uc774\ube14 DDL \uc790\ub3d9 \uc0dd\uc131 \ube44\ud65c\uc131\ud654 (\uc9c1\uc811 DDL \uad00\ub9ac)
spring.batch.jdbc.initialize-schema=never

# =====================================================
# Batch Job 스케줄 설정
# cron : 초 분 시 일 월 요일  (Spring @Scheduled 표현식)
# =====================================================
# 장기 미접속(inactiveDays일↑) 사용자 계정 잠금
batch.lockInactiveUsr.enabled=true
batch.lockInactiveUsr.cron=0 0 1 * * ?
batch.lockInactiveUsr.inactiveDays=60

# 임시 데이터 정리 (retentionDays일 이전 데이터 삭제)
batch.tempDataCleanup.enabled=true
batch.tempDataCleanup.cron=0 0 2 * * ?
batch.tempDataCleanup.retentionDays=30

# Swagger UI — Schemas 섹션 숨김 (-1: 완전 비표시)
springdoc.swagger-ui.defaultModelsExpandDepth=-1

# JWT 설정
# secret: Base64 인코딩된 256-bit 이상 키 (운영 배포 시 반드시 교체)
jwt.secret=dXRvcHNvZnQtand0LXNlY3JldC1rZXktMjAyNi1zZWN1cmUtZW5vdWdo
# 만료시간 (초 단위, 기본 3600 = 1시간)
jwt.expiration-sec=3600
