spring.application.name=utopsofit

# \ud65c\uc131 \ud504\ub85c\ud30c\uc77c: local | prod
spring.profiles.active=local

# =====================================================
# Server
# =====================================================
server.port=22020

# =====================================================
# JSP View
# =====================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# =====================================================
# MyBatis (MyBatisConfig.java \uc5d0\uc11c \uc9c1\uc811 \uc124\uc815)
# =====================================================

# =====================================================
# Logging
# =====================================================
logging.config=classpath:log4j2-spring.xml
# \ub85c\uadf8/\ud30c\uc77c \uc800\uc7a5 \uacbd\ub85c \u2014 \uc6b4\uc601(Linux) \uae30\ubcf8\uac12
# Windows \ub85c\uceec \uac1c\ubc1c \uc2dc application-local.properties \uc5d0\uc11c \uc624\ubc84\ub77c\uc774\ub4dc
app.log.dir=/utopsoft/logs

# =====================================================
# \ucca8\ubd80\ud30c\uc77c \uc800\uc7a5 \uacbd\ub85c
# =====================================================
# \uc6b4\uc601(Linux) \uae30\ubcf8\uac12: /utopsoft/files
# Windows \ub85c\uceec \uac1c\ubc1c: application-local.properties \uc5d0\uc11c C:/utopsoft/files \ub85c \uc624\ubc84\ub77c\uc774\ub4dc
app.file.dir=/utopsoft/files

# =====================================================
# Spring Batch
# =====================================================
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=never

# Batch Job \uc2a4\ucf00\uc904 \uc124\uc815 (cron: \ucd08 \ubd84 \uc2dc \uc77c \uc6d4 \uc694\uc77c)
batch.lockInactiveUsr.enabled=true
batch.lockInactiveUsr.cron=0 0 1 * * ?
batch.lockInactiveUsr.inactiveDays=60

batch.tempDataCleanup.enabled=true
batch.tempDataCleanup.cron=0 0 2 * * ?
batch.tempDataCleanup.retentionDays=30

# =====================================================
# JWT \uc124\uc815 (\uc6b4\uc601 \ubc30\ud3ec \uc2dc jwt.secret \ubc18\ub4dc\uc2dc \uad50\uccb4)
#3600	1\uc2dc\uac04
#86400	24\uc2dc\uac04
#604800	7\uc77c
# =====================================================
jwt.secret=dXRvcHNvZnQtand0LXNlY3JldC1rZXktMjAyNi1zZWN1cmUtZW5vdWdo
jwt.expiration-sec=604800

# =====================================================
# Cache (Caffeine) \u2014 CacheConfig.java \ucc38\uc870
# =====================================================
# \uce90\uc2dc \ud0c0\uc785 \uba85\uc2dc (spring-boot-starter-cache + caffeine \uc758\uc874\uc131 \ud544\uc694)
spring.cache.type=caffeine

# =====================================================
# Swagger UI \u2014 Schemas \uc139\uc158 \uc228\uae40
# =====================================================
springdoc.swagger-ui.defaultModelsExpandDepth=-1
