# =====================================================
# [local] 로컬 개발 환경 설정
# =====================================================

# Datasource — P6Spy (SQL 로깅 프록시 드라이버)
spring.datasource.driver-class-name=com.p6spy.engine.spy.P6SpyDriver
spring.datasource.url=jdbc:p6spy:mysql://localhost:3306/utopsoft?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=passw0rd

# HikariCP
spring.datasource.hikari.pool-name=UtopsoftPool-Local
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# DevTools — 자동 재시작 / LiveReload 활성화
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# 파일 로그 레벨 (ALL: 모든 로그 파일 기록)
app.log.file.level=ALL
